<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Track Your Expenses</h1>
    
    <form action="/add" method="POST">
        <label for="item">Expense Name:</label>
        <input type="text" id="item" name="item" required placeholder="e.g., Coffee">

        <label for="amount">Amount ($):</label>
        <input type="number" id="amount" name="amount" step="0.01" required placeholder="0.00">

        <button type="submit">Add Expense</button>
    </form>

    <h2>Logged Expenses</h2>
    <table border="1" style="margin-top: 20px; text-align: left; width: 300px; background: white; border-collapse: collapse; padding: 8px;">
        <thead>
            <tr>
                <th style="padding: 8px;">Item</th>
                <th style="padding: 8px;">Amount</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in expenses %}
            <tr>
                <td style="padding: 8px;">{{ expense['item'] }}</td>
                <td style="padding: 8px;">${{ expense['amount'] }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2" style="padding: 8px; text-align: center;">No expenses recorded yet!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
