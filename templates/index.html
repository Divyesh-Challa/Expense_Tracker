<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Expense Tracker</title>
</head>
<body>
    <h1>Track Your Expenses</h1>
    
    <form action="/add" method="POST">
        <label for="item">Expense Name:</label>
        <input type="text" id="item" name="item" required placeholder="e.g., Coffee">

        <label for="amount">Amount ($):</label>
        <input type="number" id="amount" name="amount" step="0.01" required placeholder="0.00">

        <button type="submit">Add Expense</button>
    </form>
</body>
</html>
